<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Fnac Catalog Assistant</title>
  <style>
    body { font-family: -apple-system, Helvetica, Arial, sans-serif; max-width: 640px; margin: 60px auto; padding: 0 16px; color: #1a1a1a; }
    h1 { font-size: 1.4rem; margin-bottom: 4px; }
    p.sub { color: #666; margin-top: 0; }
    #question { width: 100%; padding: 10px; font-size: 1rem; box-sizing: border-box; border: 1px solid #ccc; border-radius: 6px; }
    #ask { margin-top: 10px; padding: 8px 16px; font-size: 1rem; background: #eee42d; border: none; border-radius: 6px; cursor: pointer; }
    #ask:disabled { opacity: 0.5; cursor: default; }
    #answer { margin-top: 24px; white-space: pre-wrap; line-height: 1.5; }
    #products { margin-top: 12px; font-size: 0.85rem; color: #555; }
  </style>
</head>
<body>
  <h1>Ask about our catalog</h1>
  <p class="sub">e.g. "do you have noise-cancelling headphones under 200 euros?"</p>
  <input id="question" type="text" placeholder="Type your question...">
  <button id="ask">Ask</button>
  <div id="answer"></div>
  <div id="products"></div>

  <script>
    const questionEl = document.getElementById("question");
    const askBtn = document.getElementById("ask");
    const answerEl = document.getElementById("answer");
    const productsEl = document.getElementById("products");

    async function ask() {
      const question = questionEl.value.trim();
      if (!question) return;
      askBtn.disabled = true;
      answerEl.textContent = "Thinking...";
      productsEl.textContent = "";
      try {
        const res = await fetch("/api/ask", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question }),
        });
        const data = await res.json();
        if (!res.ok) {
          answerEl.textContent = "Error: " + (data.error || "something went wrong");
          return;
        }
        answerEl.textContent = data.answer;
        productsEl.textContent = "Retrieved: " + data.products.map(p => p.name).join(", ");
      } catch (e) {
        answerEl.textContent = "Error: " + e.message;
      } finally {
        askBtn.disabled = false;
      }
    }

    askBtn.addEventListener("click", ask);
    questionEl.addEventListener("keydown", (e) => { if (e.key === "Enter") ask(); });
  </script>
</body>
</html>
